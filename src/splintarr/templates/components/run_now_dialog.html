{# Shared "Run Now" dialog with cooldown override toggle.
   Include in any template that has a Run Now button:
     {% include "components/run_now_dialog.html" %}
   Requires JS to call openRunNowDialog(queueId) and confirmRunNow().
#}
<dialog id="run-now-dialog">
    <article style="max-width: 400px; margin: auto;">
        <header>
            <button aria-label="Close" rel="prev" data-action="close-run-dialog"></button>
            <h3>Run Queue Now</h3>
        </header>
        <p>Start an immediate search run for this queue?</p>
        <label>
            <input type="checkbox" id="run-override-cooldowns" role="switch">
            Override cooldowns
            <small style="display: block; color: var(--muted-color);">Search all eligible items, including those in cooldown</small>
        </label>
        <footer>
            <button class="secondary" data-action="close-run-dialog">Cancel</button>
            <button id="run-now-confirm" data-action="confirm-run-now">Run Now</button>
        </footer>
    </article>
</dialog>
